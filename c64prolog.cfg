#
# c64prolog.cfg - Custom cc65 linker config for Prolog/C64
#
# Based on the standard c64.cfg, but __HIMEM__ is capped at $2000
# so that code + BSS never overlaps the fixed runtime regions:
#
#   $2000-$27FF  trail stack   (2 KB)
#   $2800-$2FFF  choice-point stack (2 KB)
#   $3000-$37FF  environment stack  (2 KB)
#   $3800-$5FFF  heap / global stack (10 KB)
#   $6000-$63FF  atom string table  (1 KB)
#   $6400-$65FF  I/O input buffer   (512 B)
#

FEATURES {
    STARTADDRESS: default = $0801;
}
SYMBOLS {
    __LOADADDR__:  type = import;
    __EXEHDR__:    type = import;
    __STACKSIZE__: type = weak, value = $0800;   # 2 KB C software stack
    __HIMEM__:     type = weak, value = $5000;   # code + BSS top; trail starts here
}
MEMORY {
    ZP:       file = "", define = yes, start = $0002, size = $001A;
    LOADADDR: file = %O,               start = %S - 2, size = $0002;
    HEADER:   file = %O, define = yes, start = %S,     size = $000D;
    MAIN:     file = %O, define = yes, start = __HEADER_LAST__,
                                       size = __HIMEM__ - __HEADER_LAST__;
    BSS:      file = "",               start = __ONCE_RUN__,
                                       size = __HIMEM__ - __STACKSIZE__ - __ONCE_RUN__;
}
SEGMENTS {
    ZEROPAGE: load = ZP,       type = zp;
    LOADADDR: load = LOADADDR, type = ro;
    EXEHDR:   load = HEADER,   type = ro;
    STARTUP:  load = MAIN,     type = ro;
    LOWCODE:  load = MAIN,     type = ro,  optional = yes;
    CODE:     load = MAIN,     type = ro;
    RODATA:   load = MAIN,     type = ro;
    DATA:     load = MAIN,     type = rw;
    INIT:     load = MAIN,     type = rw;
    ONCE:     load = MAIN,     type = ro,  define = yes;
    BSS:      load = BSS,      type = bss, define = yes;
}
FEATURES {
    CONDES: type    = constructor,
            label   = __CONSTRUCTOR_TABLE__,
            count   = __CONSTRUCTOR_COUNT__,
            segment = ONCE;
    CONDES: type    = destructor,
            label   = __DESTRUCTOR_TABLE__,
            count   = __DESTRUCTOR_COUNT__,
            segment = RODATA;
    CONDES: type    = interruptor,
            label   = __INTERRUPTOR_TABLE__,
            count   = __INTERRUPTOR_COUNT__,
            segment = RODATA,
            import  = __CALLIRQ__;
}
